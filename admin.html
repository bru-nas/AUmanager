<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUmanager — Painel do DONO</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  :root{
    --bg:#0a0e14;--panel:#111721;--panel-2:#0d131c;--line:#1d2733;
    --ink:#e8ecf1;--muted:#7d8a9c;--gold:#d4a23a;--gold-soft:#f0c969;
    --up:#3fb88f;--down:#e0566b;--warn:#e8a13a;
    --mono:'JetBrains Mono','SF Mono',ui-monospace,Consolas,monospace;
    --disp:'Georgia','Times New Roman',serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--mono);font-size:14px;
    padding:16px;max-width:980px;margin:0 auto;-webkit-font-smoothing:antialiased}
  header{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
    border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:18px}
  h1{font-family:var(--disp);font-weight:400;font-size:24px;letter-spacing:.5px;
    display:flex;align-items:baseline;gap:10px}
  h1 .crown{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--gold);
    border:1px solid var(--gold);padding:3px 8px;border-radius:3px}
  .sub{color:var(--muted);font-size:11px;letter-spacing:1.5px;text-transform:uppercase}

  /* gate */
  .gate{position:fixed;inset:0;background:rgba(10,14,20,.96);z-index:100;
    display:flex;align-items:center;justify-content:center;padding:20px}
  .gate.hidden{display:none}
  .gate-box{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:32px 28px;width:100%;max-width:360px}
  .gate-box h2{font-family:var(--disp);font-weight:400;font-size:22px;margin-bottom:4px}
  .gate-box .gsub{color:var(--muted);font-size:12px;margin-bottom:22px}
  .gate-box label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;
    color:var(--muted);margin:14px 0 5px}
  .gate-box input{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
    font-family:var(--mono);font-size:14px;padding:11px 12px;border-radius:6px;outline:none}
  .gate-box input:focus{border-color:var(--gold)}
  .gate-err{color:var(--down);font-size:12px;margin-top:12px;min-height:16px;text-align:center}
  button{font-family:var(--mono);font-size:12px;letter-spacing:.5px;background:var(--gold);
    color:#0a0e14;border:none;padding:10px 16px;border-radius:5px;cursor:pointer;font-weight:600}
  button:hover{opacity:.88}
  button.ghost{background:transparent;color:var(--gold);border:1px solid var(--gold)}
  button.danger{background:transparent;color:var(--down);border:1px solid var(--down)}
  button.tiny{padding:5px 10px;font-size:11px}
  .gate-box button{width:100%;margin-top:18px;padding:12px}

  .stat{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1px;
    background:var(--line);border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:18px}
  .stat .c{background:var(--panel);padding:12px 14px}
  .stat .k{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
  .stat .v{font-size:22px;margin-top:3px}
  .v.green{color:var(--up)} .v.amber{color:var(--warn)}

  .toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .toolbar input{flex:1;min-width:180px;background:var(--panel-2);border:1px solid var(--line);
    color:var(--ink);font-family:var(--mono);font-size:13px;padding:9px 12px;border-radius:6px;outline:none}
  .toolbar input:focus{border-color:var(--gold)}

  .list{display:flex;flex-direction:column;gap:8px}
  .u{background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .u .info{display:flex;flex-direction:column;gap:3px;min-width:200px;flex:1}
  .u .email{font-size:13px;color:var(--ink)}
  .u .meta{font-size:11px;color:var(--muted)}
  .u .acts{display:flex;gap:6px;flex-wrap:wrap}
  .pill{font-size:10px;letter-spacing:.5px;text-transform:uppercase;padding:2px 8px;
    border-radius:20px;border:1px solid currentColor}
  .pill.ativo{color:var(--up)} .pill.pendente{color:var(--warn)} .pill.bloqueado{color:var(--down)}
  .pill.locked{color:var(--muted)}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:30px}
  footer{margin-top:20px;padding-top:14px;border-top:1px solid var(--line);
    font-size:10.5px;color:var(--muted);line-height:1.7}
</style>
</head>
<body>

<!-- gate -->
<div class="gate" id="gate">
  <div class="gate-box">
    <h2>Painel do DONO</h2>
    <div class="gsub">Acesso restrito · AUmanager</div>
    <label>E-mail</label>
    <input type="email" id="gEmail" placeholder="dono@email.com">
    <label>Senha</label>
    <input type="password" id="gPass" placeholder="••••••••">
    <button id="gSubmit">Entrar</button>
    <div class="gate-err" id="gErr"></div>
  </div>
</div>

<header>
  <h1>AUmanager <span class="crown">👑 DONO</span></h1>
  <div style="display:flex;gap:10px;align-items:center">
    <span class="sub" id="adminEmail"></span>
    <button class="ghost tiny" id="logoutBtn">Sair</button>
  </div>
</header>

<div class="stat" id="stat"></div>

<div class="toolbar">
  <input type="text" id="search" placeholder="Buscar por e-mail...">
  <button class="ghost" id="refreshBtn">Atualizar</button>
</div>

<div class="list" id="list"></div>

<footer>
  Painel administrativo da AUmanager. Liberação concede acesso ao modo completo (dados reais,
  alertas e notificações). Cada conta ativa trava no primeiro dispositivo; use <b>Liberar device</b>
  quando o assinante trocar de aparelho.
</footer>

<script>
/* ===================== CONFIG (mesma do index.html) ===================== */
const firebaseConfig = {
  apiKey: "AIzaSyAM_p_2SocFfQycHHH63PTX8Otz0eN8L0Y",
  authDomain: "aumanager-6dbd3.firebaseapp.com",
  databaseURL: "https://aumanager-6dbd3-default-rtdb.firebaseio.com",
  projectId: "aumanager-6dbd3",
  storageBucket: "aumanager-6dbd3.firebasestorage.app",
  messagingSenderId: "44149389160",
  appId: "1:44149389160:web:cd831532ea2648e36408dd"
};
const DONO_UID = "V8Bxuu9zRmSAS9n8Gq3q0hV4tWN2";

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const fdb  = firebase.database();

/* ===================== AUTH ===================== */
function showGate(s){ document.getElementById('gate').classList.toggle('hidden', !s); }
function gateError(m){ document.getElementById('gErr').textContent = m||''; }

document.getElementById('gSubmit').onclick = login;
document.getElementById('gPass').addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });
document.getElementById('logoutBtn').onclick = ()=> auth.signOut();

async function login(){
  const email=document.getElementById('gEmail').value.trim();
  const pass=document.getElementById('gPass').value;
  if(!email||!pass){ gateError('Preencha e-mail e senha.'); return; }
  gateError('');
  try{ await auth.signInWithEmailAndPassword(email,pass); }
  catch(e){ gateError('E-mail ou senha incorretos.'); }
}

auth.onAuthStateChanged(user=>{
  if(!user){ showGate(true); return; }
  // SÓ o DONO entra — qualquer outro UID é expulso na hora (igual BACBRU)
  if(user.uid !== DONO_UID){
    gateError('Esta conta não tem permissão de administrador.');
    auth.signOut(); showGate(true); return;
  }
  document.getElementById('adminEmail').textContent = user.email;
  showGate(false);
  loadUsers();
});

/* ===================== USERS ===================== */
let USERS = [];
document.getElementById('refreshBtn').onclick = loadUsers;
document.getElementById('search').addEventListener('input', render);

async function loadUsers(){
  const snap = await fdb.ref('users').get();
  const val = snap.val() || {};
  USERS = Object.entries(val).map(([uid,u])=>({ uid, ...u }));
  renderStats(); render();
}

function renderStats(){
  const total=USERS.length;
  const ativos=USERS.filter(u=>u.status==='ativo').length;
  const pend=USERS.filter(u=>u.status==='pendente').length;
  const block=USERS.filter(u=>u.status==='bloqueado').length;
  document.getElementById('stat').innerHTML=`
    <div class="c"><div class="k">Total</div><div class="v">${total}</div></div>
    <div class="c"><div class="k">Ativos</div><div class="v green">${ativos}</div></div>
    <div class="c"><div class="k">Pendentes</div><div class="v amber">${pend}</div></div>
    <div class="c"><div class="k">Bloqueados</div><div class="v">${block}</div></div>
  `;
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const rows=USERS
    .filter(u=>(u.email||'').toLowerCase().includes(q))
    .sort((a,b)=>{
      const order={pendente:0,ativo:1,bloqueado:2};
      return (order[a.status]??9)-(order[b.status]??9);
    });
  const box=document.getElementById('list');
  if(!rows.length){ box.innerHTML='<div class="empty">Nenhum assinante ainda.</div>'; return; }
  box.innerHTML = rows.map(u=>{
    const st=u.status||'pendente';
    const devs = u.devices ? Object.entries(u.devices) : [];
    const devInfo = devs.length
      ? devs.map(([id,d])=>`<span class="pill locked">${(d&&d.label)||'device'}</span>`).join('')
      : '';
    const created = u.createdAt ? new Date(u.createdAt).toLocaleDateString('pt-BR') : '—';
    let acts='';
    if(st!=='ativo')    acts+=`<button class="tiny" data-act="ativar" data-uid="${u.uid}">Liberar acesso</button>`;
    if(st==='ativo' && devs.length) acts+=`<button class="ghost tiny" data-act="device" data-uid="${u.uid}">Liberar devices (${devs.length}/2)</button>`;
    if(st!=='bloqueado')acts+=`<button class="danger tiny" data-act="bloquear" data-uid="${u.uid}">Bloquear</button>`;
    if(st==='bloqueado')acts+=`<button class="tiny" data-act="ativar" data-uid="${u.uid}">Reativar</button>`;
    return `<div class="u">
      <div class="info">
        <span class="email">${u.email||'(sem e-mail)'}</span>
        <span class="meta">Criado: ${created} · UID: ${u.uid.slice(0,8)}…</span>
      </div>
      <div class="acts">
        <span class="pill ${st}">${st}</span>${devInfo}
        ${acts}
      </div>
    </div>`;
  }).join('');

  box.querySelectorAll('button[data-act]').forEach(b=>{
    b.onclick = ()=> handleAct(b.dataset.act, b.dataset.uid);
  });
}

async function handleAct(act, uid){
  const ref = fdb.ref('users/'+uid);
  if(act==='ativar'){
    await ref.update({ status:'ativo' });
  }else if(act==='bloquear'){
    await ref.update({ status:'bloqueado' });
  }else if(act==='device'){
    // reseta a trava: remove todos os aparelhos para o assinante registrar de novo
    await ref.child('devices').remove();
  }
  loadUsers();
}
</script>
</body>
</html>
